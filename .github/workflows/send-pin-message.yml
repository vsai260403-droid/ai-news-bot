name: Send Pin Message

on:
  workflow_dispatch:

jobs:
  send-pin:
    runs-on: ubuntu-latest
    steps:
      - name: Send welcome message to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "username": "AI News Bot",
              "content": "📌 **AI 뉴스 데일리 봇 가이드**\n━━━━━━━━━━━━━━━━━━━━\n\n🗞️ **자동 뉴스 브리핑**\n매일 아침 **8시(KST)** 에 AI/기술 뉴스 TOP 10을 자동으로 전송합니다.\n• 9개 글로벌 소스에서 수집 (TechCrunch, The Verge, OpenAI, Google AI 등)\n• AI가 중요도 순으로 선별하고 한국어로 요약\n• 비즈니스 뉴스·중복 기사는 자동 제외\n\n💬 **AI 질의응답 (준비 중)**\n`!ask` 명령어로 AI에게 질문할 수 있습니다.\n\n> `!ask GPT-5.5가 뭐야?`\n> `!ask 트랜스포머 아키텍처 쉽게 설명해줘`\n> `!ask 오늘 AI 뉴스 트렌드 정리해줘`\n\n📋 **명령어 목록**\n• `!ask [질문]` — AI에게 질문하기\n• `!help` — 이 안내 메시지 보기\n\n━━━━━━━━━━━━━━━━━━━━\n🤖 Powered by GPT-5.5 (OpenAI)"
            }' \
            "$DISCORD_WEBHOOK_URL"
